<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />

    <!-- PWA & Mobile -->
    <meta name="theme-color" content="#8B3FFF" />
    <meta name="color-scheme" content="light" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ennie" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- iOS Splash Screens (prevents white flash on launch) -->
    <!-- iPhone 15 Pro Max, 14 Pro Max -->
    <link rel="apple-touch-startup-image" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" href="/splash-1290x2796.png" />
    <!-- iPhone 15 Pro, 14 Pro -->
    <link rel="apple-touch-startup-image" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" href="/splash-1179x2556.png" />
    <!-- iPhone 15, 14, 13, 12 -->
    <link rel="apple-touch-startup-image" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" href="/splash-1170x2532.png" />
    <!-- iPhone SE 3rd gen, 8, 7, 6s -->
    <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" href="/splash-750x1334.png" />
    <!-- iPhone 15 Plus, 14 Plus, 13 Pro Max, 12 Pro Max -->
    <link rel="apple-touch-startup-image" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)" href="/splash-1284x2778.png" />
    <!-- iPhone 16 Pro -->
    <link rel="apple-touch-startup-image" media="(device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3)" href="/splash-1206x2622.png" />
    <!-- iPhone 16 Pro Max -->
    <link rel="apple-touch-startup-image" media="(device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3)" href="/splash-1320x2868.png" />

    <!-- Android -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-192.png" />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>Ennie</title>

    <style>
      /* Critical CSS: prevent flash of unstyled content */
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root {
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
      }
      body {
        background: #FFFFFF;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }
      /* Prevent iOS rubber-band bounce on body */
      body { position: fixed; width: 100%; }
      /* Loading state while JS loads */
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse 110% 65% at 50% -5%, #9747FF 0%, #C4A0FF 38%, #EDE0FF 60%, #FFFFFF 80%);
      }
      #root:empty::after {
        content: '';
        width: 40px;
        height: 40px;
        border: 3px solid rgba(139,63,255,0.2);
        border-top-color: #8B3FFF;
        border-radius: 50%;
        animation: _spin 0.6s linear infinite;
      }
      @keyframes _spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
